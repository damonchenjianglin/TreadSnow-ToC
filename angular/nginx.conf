# HTTPS 配置（仅443端口）
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name treadshow.com.cn www.treadshow.com.cn;

    # SSL 证书配置
    ssl_certificate /var/nginxcert/certificate.pem;
    ssl_certificate_key /var/nginxcert/private.key;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 安全配置
    ssl_protocols TLSv1.2 TLSv1.3; 
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # 网站根目录
    root /var/www/dist/TreadSnow;
    index index.html index.htm;

    # 处理 Angular 路由（使用ABP的配置）
    location / {
        try_files $uri $uri/ /index.html =404;
    }

    # ABP 的动态环境配置端点（重要！）
    location /getEnvConfig {
        default_type 'application/json';
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Content-Type' 'application/json';
        try_files $uri /dynamic-env.json;
    }

    # 缓存静态资源
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 错误页面
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /var/www/dist/TreadSnow;
    }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
}